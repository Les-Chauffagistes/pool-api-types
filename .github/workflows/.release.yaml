name: Release

on:
  push:
    branches: [main, test-cicd]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: [macOS, self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
      
      - name: Setup Python
        run: |
          python3.13 -m venv venv
          venv/bin/pip install --upgrade pip
      - name: Install deps
        run: |
          venv/bin/pip install datamodel-code-generator build twine
          npm ci

      - name: Generate Python models
        run: |
          venv/bin/datamodel-codegen \
            --input schema/api.yaml \
            --input-file-type openapi \
            --output python/subscription_types/models.py

      - name: Generate TypeScript types
        run: |
          npx openapi-typescript schema/api.yaml \
            -o typescript/src/types.ts

      - name: Build Python package
        run: |
          cd python
          ../venv/bin/python -m build

      - name: Compute version
        id: version
        run: |
          latest_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n 1)
          current=${latest_tag:-v0.0.0}

          commits=$(git log ${latest_tag}..HEAD --pretty=%s)

          major=0
          minor=0

          while read -r line; do
            if echo "$line" | grep -qE "BREAKING CHANGE|!:"; then
              major=1
            elif echo "$line" | grep -q "^feat:"; then
              minor=1
            fi
          done <<< "$commits"

          version=${current#v}
          IFS='.' read -r x y z <<< "$version"

          if [ "$major" -eq 1 ]; then
            x=$((x+1)); y=0; z=0
          elif [ "$minor" -eq 1 ]; then
            y=$((y+1)); z=0
          else
            z=$((z+1))
          fi

          new_version="v$x.$y.$z"

          echo "version=$new_version" >> $GITHUB_OUTPUT
          echo "VERSION=$new_version" >> $GITHUB_ENV

      - name: Check tag exists
        id: tag_check
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish TypeScript package
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          cd typescript
          npm version ${VERSION#v} --no-git-tag-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          git tag $VERSION
          git push origin $VERSION

      - name: Publish Python package
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          venv/bin/twine upload \
            --repository-url http://localhost:5050/ \
            --skip-existing \
            python/dist/*
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}

      - name: Create release
        if: steps.tag_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            python/dist/*
